apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener

spec:
  replicas: 1

  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      containers:
        - name: url-shortener
          image: docker.io/tuusuario/python-url-shortener:latest
          ports:
            - containerPort: 8000
