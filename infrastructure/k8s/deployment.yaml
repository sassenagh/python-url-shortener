apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener

spec:
  replicas: 1

  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      containers:
        - name: url-shortener
          image: sassenagh/python-url-shortener:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
