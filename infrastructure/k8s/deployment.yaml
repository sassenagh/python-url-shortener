apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  namespace: url-shortener-ns

spec:
  replicas: 1

  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      containers:
        - name: url-shortener
          image: us-central1-docker.pkg.dev/python-url-shortener-489910/url-shortener-repo/python-url-shortener:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
